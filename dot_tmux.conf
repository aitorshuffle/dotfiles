# Prefer this single entry point so tmux always loads the same config whether your
# tmux build checks ~/.tmux.conf first or falls through to XDG.
# TPM, plugins (opensessions), and bun all resolve under ~/.config/tmux/ when
# TMUX_PLUGIN_MANAGER_PATH is set there — see ~/.config/tmux/tmux.conf.
source-file ~/.config/tmux/tmux.conf
