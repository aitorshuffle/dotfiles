# ~/.config/starship.toml config managed by chezmoi
# Get editor completions based on the schema
"$schema" = 'https://starship.rs/config-schema.json'

# Use standard prompt order
format = """
[╭─](dimmed white)$username$hostname$directory$git_branch$git_status
[╰─](dimmed white)$character
"""

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# Disable the blank line at the start of the prompt
add_newline = false

[directory]
style = "blue"
truncation_length = 4
truncate_to_repo = false

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
symbol = "🌱 "
style = "bold green"

[git_status]
style = "bold red"
