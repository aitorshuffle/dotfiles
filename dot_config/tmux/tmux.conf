# refresh config for all sessions instantly. ref: https://www.youtube.com/watch?v=jaI3Hcw-ZaA&t=352s
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# enable mouse. ref: https://www.youtube.com/watch?v=jaI3Hcw-ZaA&t=352s
set -g mouse on

## Modify status bar as per ref: https://ericmjl.github.io/blog/2025/12/27/how-i-themed-my-tmux-with-opencode-and-claude/ 
# Fix gaps by defining the global status bar styling
set -g status-style "bg=#2e3440,fg=#d8dee9"
set -g status-left-length 120
set -g status-right-length 100
# Thin separator between windows for a cleaner look
setw -g window-status-separator "#[fg=#5e81ac,bg=#88c0d0]"

# status-left: Blue session block smoothly merging into the cyan window block
set -g status-left "#[fg=#2e3440,bg=#5e81ac,bold] #S #[fg=#5e81ac,bg=#88c0d0]"

# Uniform cyan background for windows with dark grey text
setw -g window-status-format "#[fg=#2e3440,bg=#88c0d0] #I #W "

# Active window highlighted in bold dark grey text, resting on the cyan background
setw -g window-status-current-format "#[fg=#2e3440,bg=#88c0d0,bold] #I #W "

# Window block termination: beautifully merges the grey block back into the dark grey base
# We omit appending to status-left. Instead, we just let the last window end flat, or add an arrow IF there was a way.
# Since tmux doesn't let us conditionally end the last window, we just let the background be flat.

# right side (battery, date, time) - Perfect backwards rainbow gradient with universal ⚡ icon
set -g status-right "#[fg=#a3be8c,bg=#2e3440]#[fg=#2e3440,bg=#a3be8c,bold] ⚡ #(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 | sed 's/$/%%/' || echo 'AC') #[fg=#5e81ac,bg=#a3be8c]#[fg=#d8dee9,bg=#5e81ac] %b %d #[fg=#88c0d0,bg=#5e81ac]#[fg=#2e3440,bg=#88c0d0,bold] %H:%M "

## Configure TPM plugin manager and which plugins are loadedList of plugins
# plugins
set -g @plugin 'tmux-plugins/tpm' # https://github.com/tmux-plugins/tpm
set -g @plugin 'Ataraxy-Labs/opensessions' # opensessions sidebar plugin, from https://github.com/Ataraxy-Labs/opensessions/
# set -g @plugin 'tmux-plugins/tmux-sensible'# https://github.com/tmux-plugins/tmux-sensible (basic settings everyone should agree on)

# TPM plugin syntax:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

#how to install a plugin:
# `tmux source-file ~/.config/tmux/tmux.conf` # i.e. Ctrl+b, r (it should be binded)
# ~/.config/tmux/plugins/tpm/bin/install_plugins  # Ctrl+b, Shift + i
